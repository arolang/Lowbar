name: lowbar
version: 1.0.0
handle: Lowbar
description: >
  Underscore.js for ARO — a comprehensive utility plugin providing 60+ collection,
  array, object, and utility qualifiers plus generator actions, modeled after
  the beloved underscore.js library.
author: ARO Community
license: MIT
aro-version: '>=0.9.1'

provides:
  - type: swift-plugin
    path: Sources/

build:
  swift:
    minimum-version: '6.2'
    targets:
      - name: LowbarPlugin
        path: Sources/
