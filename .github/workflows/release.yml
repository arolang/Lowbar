name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  pages: write
  id-token: write

env:
  SWIFT_VERSION: '6.2'

jobs:
  test:
    name: Test before release
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Install ARO
        run: |
          brew tap arolang/aro
          brew install aro

      - name: Build plugin
        run: |
          cd Plugins/lowbar
          swift build -c release

      - name: Run tests
        run: aro test .

  release:
    name: Create Release
    runs-on: macos-15
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Build plugin (release)
        run: |
          cd Plugins/lowbar
          swift build -c release

      - name: Package plugin
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          mkdir -p dist/lowbar
          cp -r Plugins/lowbar/Sources dist/lowbar/
          cp Plugins/lowbar/Package.swift dist/lowbar/
          cp Plugins/lowbar/plugin.yaml dist/lowbar/
          cd dist
          tar czf lowbar-${TAG}.tar.gz lowbar/
          echo "ARCHIVE=dist/lowbar-${TAG}.tar.gz" >> $GITHUB_ENV
          echo "TAG_VERSION=${TAG}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Lowbar ${{ env.TAG_VERSION }}
          generate_release_notes: true
          files: ${{ env.ARCHIVE }}

  pages:
    name: Deploy Website
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
