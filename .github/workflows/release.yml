name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  pages: write
  id-token: write

env:
  SWIFT_VERSION: '6.2'

jobs:
  build:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          # Update plugin.yaml
          sed -i '' "s/^version:.*/version: $VERSION/" plugin.yaml

          # Update LowbarPlugin.swift
          sed -i '' "s/version: \"[^\"]*\"/version: \"$VERSION\"/" Sources/LowbarPlugin.swift

          echo "Set version to $VERSION from tag $GITHUB_REF_NAME"
          grep '^version:' plugin.yaml
          grep 'version:' Sources/LowbarPlugin.swift | head -1

      - name: Commit version and update tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugin.yaml Sources/LowbarPlugin.swift
          if git diff --cached --quiet; then
            echo "Version already matches tag — nothing to commit"
          else
            git commit -m "release: set version to $VERSION"
            git tag -f "$GITHUB_REF_NAME"
            git push origin HEAD:main
            git push origin "$GITHUB_REF_NAME" --force
          fi

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Build plugin
        run: |
          cd Plugins/lowbar
          swift build -c release

      - name: Install ARO
        run: |
          brew tap arolang/aro
          brew install aro

      - name: Run tests
        run: aro test .

  release:
    name: Create Release
    runs-on: macos-15
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i '' "s/^version:.*/version: $VERSION/" plugin.yaml
          sed -i '' "s/version: \"[^\"]*\"/version: \"$VERSION\"/" Sources/LowbarPlugin.swift

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Build plugin (release)
        run: |
          cd Plugins/lowbar
          swift build -c release

      - name: Package plugin
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          mkdir -p dist/lowbar
          cp -r Plugins/lowbar/Sources dist/lowbar/
          cp Plugins/lowbar/Package.swift dist/lowbar/
          cp Plugins/lowbar/plugin.yaml dist/lowbar/
          cd dist
          tar czf lowbar-${TAG}.tar.gz lowbar/
          echo "ARCHIVE=dist/lowbar-${TAG}.tar.gz" >> $GITHUB_ENV
          echo "TAG_VERSION=${TAG}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Lowbar ${{ env.TAG_VERSION }}
          generate_release_notes: true
          files: ${{ env.ARCHIVE }}
